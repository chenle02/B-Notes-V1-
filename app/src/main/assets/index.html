<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>B-Notes V1</title><style>*{box-sizing:border-box}body{margin:0;background:#07131e;color:#eff8ff;font-family:system-ui;overflow:hidden}.app{height:100vh;display:flex;flex-direction:column;background:radial-gradient(circle at top,#174569,#07131e 45%,#04070c)}.top{display:flex;align-items:center;gap:10px;padding:12px}.logo{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#0b84ff,#50ff9d);display:grid;place-items:center;font-size:24px}h1{font-size:22px;margin:0}.sub{color:#a8c7d9;font-size:12px}.spacer{flex:1}.btn{border:0;border-radius:999px;background:rgba(255,255,255,.14);color:white;font-weight:800;padding:10px 12px;margin:3px}.primary{background:#0b84ff}.danger{background:#d64242}.star{background:#f59e0b}.search{margin:0 12px 8px;background:rgba(8,22,34,.9);border:1px solid rgba(255,255,255,.15);border-radius:18px;padding:10px}.search input,input,textarea{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:14px;color:white;padding:10px;outline:0;font-size:15px}textarea{min-height:210px;resize:none;line-height:1.45}.tabs{display:flex;gap:6px;padding:0 12px 8px}.tab{border:0;border-radius:999px;background:rgba(255,255,255,.14);color:white;font-weight:800;padding:8px 12px}.tab.on{background:#0b84ff}.main{flex:1;display:flex;min-height:0}.list{width:38%;min-width:145px;overflow:auto;padding:8px 6px 76px 12px;border-right:1px solid rgba(255,255,255,.1)}.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);border-radius:14px;padding:10px;margin-bottom:8px}.card.on{border-color:#50ff9d;background:rgba(80,255,157,.12)}.card b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.card small{display:block;color:#a8c7d9;font-size:11px;margin-top:4px}.editor{flex:1;overflow:auto;padding:8px 12px 78px 10px}.field{margin-bottom:8px}.titleInput{font-weight:800;font-size:18px}.actions{position:fixed;left:10px;right:10px;bottom:10px;display:flex;gap:6px;overflow-x:auto} .actions button{white-space:nowrap}@media(max-width:700px){.main{display:block}.list{width:100%;height:37%;border-right:0;border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:8px}.editor{height:63%;padding-bottom:84px}.top h1{font-size:20px}.btn{padding:9px 10px}}</style></head><body><div class="app"><div class="top"><div class="logo">📝</div><div><h1>B-Notes V1</h1><div class="sub">Local notes, tags, favorites</div></div><div class="spacer"></div><button class="btn" onclick="openBMap()">🗺️ B-Map V1</button></div><div class="search"><input id="search" placeholder="Search notes, tags, ideas..." oninput="renderList()"></div><div class="tabs"><button id="all" class="tab on" onclick="setFilter('all')">All</button><button id="fav" class="tab" onclick="setFilter('fav')">Favorites</button><button id="today" class="tab" onclick="setFilter('today')">Today</button></div><div class="main"><div class="list" id="list"></div><div class="editor" id="editor"></div></div><div class="actions"><button class="btn primary" onclick="newNote()">+ New</button><button class="btn" onclick="saveNote()">Save</button><button class="btn star" onclick="toggleFav()">★ Favorite</button><button class="btn" onclick="copyMD()">Copy MD</button><button class="btn danger" onclick="deleteNote()">Delete</button></div></div><script>let notes=[],currentId=null,filter='all';try{notes=JSON.parse(localStorage.getItem('bnotes_notes')||'[]')}catch(e){}function uid(){return'n'+Date.now()+Math.floor(Math.random()*999)}function now(){return new Date().toISOString()}function saveStore(){localStorage.setItem('bnotes_notes',JSON.stringify(notes))}function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function fmt(t){try{return new Date(t).toLocaleString()}catch(e){return''}}function today(){return now().slice(0,10)}function cur(){return notes.find(n=>n.id===currentId)}function seed(){if(notes.length)return;notes=[{id:uid(),title:'Welcome to B-Notes V1',body:'This is your local-first notes app.\n\nUse tags like #math #travel #ideas.\n\nTap B-Map V1 to jump to your map app.',tags:'welcome ideas',favorite:true,created:now(),updated:now()}];currentId=notes[0].id;saveStore()}seed();function setFilter(f){filter=f;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));document.getElementById(f).classList.add('on');renderList()}function filtered(){let q=document.getElementById('search').value.toLowerCase().trim();return notes.filter(n=>(filter!='fav'||n.favorite)&&(filter!='today'||(n.updated||'').slice(0,10)==today())&&(!q||(n.title+' '+n.body+' '+n.tags).toLowerCase().includes(q))).sort((a,b)=>(b.updated||'').localeCompare(a.updated||''))}function renderList(){let list=document.getElementById('list'),arr=filtered();list.innerHTML='';if(!arr.length){list.innerHTML='<div style="color:#a8c7d9;padding:20px">No notes found.</div>';return}arr.forEach(n=>{let d=document.createElement('div');d.className='card '+(n.id==currentId?'on':'');d.onclick=()=>{currentId=n.id;renderList();renderEditor()};d.innerHTML='<b>'+(n.favorite?'★ ':'')+esc(n.title||'Untitled')+'</b><small>'+esc(n.tags||'no tags')+'</small><small>'+fmt(n.updated)+'</small>';list.appendChild(d)})}function renderEditor(){let e=document.getElementById('editor'),n=cur();if(!n){e.innerHTML='<div style="color:#a8c7d9;padding:20px">Select or create a note.</div>';return}e.innerHTML='<input class="field titleInput" id="title" placeholder="Title" value="'+esc(n.title)+'"><input class="field" id="tags" placeholder="Tags: math travel ideas" value="'+esc(n.tags)+'"><textarea class="field" id="body" placeholder="Write your note here...">'+esc(n.body)+'</textarea>'}function newNote(){let n={id:uid(),title:'Untitled note',body:'',tags:'',favorite:false,created:now(),updated:now()};notes.unshift(n);currentId=n.id;saveStore();renderList();renderEditor()}function saveNote(){let n=cur();if(!n)return;n.title=document.getElementById('title')?.value||'Untitled note';n.tags=document.getElementById('tags')?.value||'';n.body=document.getElementById('body')?.value||'';n.updated=now();saveStore();renderList()}function toggleFav(){let n=cur();if(!n)return;n.favorite=!n.favorite;n.updated=now();saveStore();renderList();renderEditor()}function deleteNote(){let n=cur();if(!n)return;if(!confirm('Delete this note?'))return;notes=notes.filter(x=>x.id!==n.id);currentId=notes[0]?.id||null;saveStore();renderList();renderEditor()}function copyMD(){let n=cur();if(!n)return;saveNote();let t='# '+n.title+'\n\nTags: '+n.tags+'\n\n'+n.body;navigator.clipboard?.writeText(t).then(()=>alert('Markdown copied.'),()=>alert(t))}function openBMap(){if(window.AndroidBridge){AndroidBridge.openBMap()}else alert('B-Map V1 shortcut works in the Android app.')}window.bnotesBack=function(){saveNote();alert('Saved. Use Android back again to leave.')};currentId=notes[0]?.id||null;renderList();renderEditor();</script></body></html>
